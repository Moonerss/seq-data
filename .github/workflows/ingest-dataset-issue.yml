name: Auto ingest dataset issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  ingest:
    if: startsWith(github.event.issue.title, 'Add dataset:') && github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Save issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: printf '%s\n' "$ISSUE_BODY" > issue-body.md

      - name: Append dataset record
        run: ISSUE_BODY_PATH=issue-body.md npm exec tsx scripts/append-issue-dataset.ts

      - name: Validate updated catalog
        run: npm test && npm run typecheck && npm run build:data

      - name: Commit dataset update
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if git diff --quiet -- data/datasets.csv; then
            echo "No dataset changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/datasets.csv
          git commit -m "data: add dataset from issue #${ISSUE_NUMBER}"
          git push

      - name: Build encrypted site
        run: npm run build
        env:
          DATASET_CATALOG_PASSWORD: ${{ secrets.DATASET_CATALOG_PASSWORD }}

      - name: Verify plaintext data is not deployed
        run: |
          test ! -f dist/datasets.json
          test -f dist/datasets.enc.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment and close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" --body "Dataset record was validated, appended to data/datasets.csv, and deployed to GitHub Pages."
          gh issue close "${ISSUE_NUMBER}" --comment "Closed after automatic ingestion and deployment."